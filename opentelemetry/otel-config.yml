receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317   
      http:
        endpoint: 0.0.0.0:4318   

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s
    send_batch_max_size: 2048

exporters:
  loki:
    endpoint: http://localhost:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: true
      job: true
      instance: true
      level: true
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel
    enable_open_metrics: true
  otlp/tempo:
    endpoint: localhost:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [otlp/tempo]
    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [prometheus]
    logs:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [loki]